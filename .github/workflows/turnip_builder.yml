name: Build "turnip"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

jobs:
  start_building_turnip:
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ inputs.version }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Prepare environment
      run: |
        sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
        sudo apt update
        sudo apt install build-essential flex bison glslang-tools
        sudo apt install meson-1.5 

    - name: Execute build script
      run: bash ./turnip_builder.sh

    - name: Release "turnip"
      uses: softprops/action-gh-release@v1
      with:
        body: |
          A8XX Turnip Vulkan V${{ inputs.version }}
          Built from: https://github.com/Anmol6002/mesa-unified (turnip/gen8 branch)
          Anmol6002:- i just forked from whitebelyash repo , and there are two versions one -R2 and second -R3
          -R2:- test (previously released) build by Just adding a613 unofficial support works normally maybe only one release not gonna build again will push to original mess-unified source code of whitebelyash
          -R3:- this build going to be forever specialised build for a613 and other a6xx devices forcing vulkan 1.4 and opening other code paths bypassing family chip only tested on a613 so test on your own on others 
          these builds are going to be based on whitebelyash mesa-unified source obviously i am not a dev just compiling and doing and getting a bit of know how via AI that is.
          everything else is written below 👇🏻 by whitebelyash 
          I didn't test this this much. Contact me on FEX (#android-wastelands) or EmuCore discord if there are any issues.

          
          >[!WARNING]
          > Please don't report issues to Mesa, PLEASE
                    
          Supported GPUs:
          * Adreno 8XX Family: 840, 830, 829, 825, 810
          * Adreno 7XX Family: any GPU supported by the upstream Turnip + 710/720 from Termux patches (unstable)
          * Adreno 6XX Family: any GPU supported by the upstream Turnip
          
          GPUs other than 830/840 can have reduced performance and/or more glitches. Can't do anything about that, sorry!  
          Adreno 810 is additionally very slow, I'm not sure if you even want to use Turnip there
          
          Notes:
          * Disable DXVK_HUD if you see weird black artifacts
          * Apparently there are swizzling glitches in Eden & maybe other emulators, try increasing render scale(?)
          * Some games may require AMD/NVIDIA GPU to run and refuse to start on Qualcomm or block some features. I've included a patch to spoof as Steam Deck - use `TU_DEBUG=deck_emu`
          * GMEM rendering produces glitchy picture on A830 (write page faults), disable it with `TU_DEBUG=sysmem`. It's pretty much useless for PC emulation anyway.

        tag_name: tu_v${{ inputs.version }}
        name: Turnip A8XX v${{ inputs.version }}
        files: |
           /tmp/a8xx-turnip-gen8-V${{ inputs.version }}.zip
           /tmp/a8xx-turnip-gen8-sync-V${{ inputs.version }}.zip
